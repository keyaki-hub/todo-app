<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>定期テンプレート</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #f5f5f7;
    color: #222;
    padding-bottom: 80px;
  }
  header {
    background: #2c7be5;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; }
  header a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; }
  .note {
    font-size: 12px;
    color: #666;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #eee;
  }
  .list { padding: 12px; }
  .tpl {
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .tpl.inactive { opacity: 0.5; }
  .tpl .info { flex: 1; min-width: 0; }
  .tpl .title { font-size: 15px; font-weight: 600; }
  .tpl .meta { font-size: 12px; color: #888; margin-top: 4px; }
  .empty { text-align: center; color: #999; padding: 40px 0; }

  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #2c7be5;
    color: #fff;
    font-size: 30px;
    border: none;
    box-shadow: 0 4px 12px rgba(44,123,229,0.4);
    cursor: pointer;
    z-index: 5;
  }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }
  .modal h2 { margin: 0 0 12px; font-size: 16px; }
  .modal label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%;
    padding: 10px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-size: 15px;
    margin-bottom: 12px;
    background: #fff;
  }
  .row-2 { display: flex; gap: 8px; }
  .row-2 > * { flex: 1; }
  .btn-row { display: flex; flex-direction: column; gap: 8px; }
  .btn {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-primary { background: #2c7be5; color: #fff; }
  .btn-secondary { background: #edf2f7; color: #333; }
  .btn-danger { background: #fff; color: #e53e3e; border: 1px solid #fed7d7; }
  .btn-cancel { background: none; color: #666; }
</style>
</head>
<body>

<header>
  <h1>定期テンプレート</h1>
  <a href="/">← ToDo</a>
</header>
<div class="note">発生日の <strong>7日前</strong> からToDo一覧に自動追加されます。</div>

<div id="list" class="list"></div>

<button class="fab" onclick="openForm()">＋</button>

<div id="form-modal" class="modal-bg" onclick="closeForm(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="form-title">新規テンプレート</h2>

    <label>タイトル</label>
    <input id="f-title" type="text" placeholder="例：家賃を振り込む">

    <label>繰り返し</label>
    <select id="f-type" onchange="updateFields()">
      <option value="weekly">毎週</option>
      <option value="monthly" selected>毎月</option>
      <option value="yearly">毎年</option>
    </select>

    <div id="field-weekly" style="display:none;">
      <label>曜日</label>
      <select id="f-weekday">
        <option value="0">月曜</option>
        <option value="1">火曜</option>
        <option value="2">水曜</option>
        <option value="3">木曜</option>
        <option value="4">金曜</option>
        <option value="5">土曜</option>
        <option value="6">日曜</option>
      </select>
    </div>

    <div id="field-monthly">
      <label>日付（月の何日）</label>
      <select id="f-monthday"></select>
    </div>

    <div id="field-yearly" style="display:none;">
      <div class="row-2">
        <div>
          <label>月</label>
          <select id="f-year-month"></select>
        </div>
        <div>
          <label>日</label>
          <select id="f-year-day"></select>
        </div>
      </div>
    </div>

    <label><input id="f-active" type="checkbox" checked style="width:auto;margin-right:6px;"> 有効にする</label>

    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-primary" onclick="saveTemplate()">保存</button>
      <button id="f-delete" class="btn btn-danger" onclick="deleteTemplate()" style="display:none;">🗑 削除</button>
      <button class="btn btn-cancel" onclick="closeForm()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const WEEKDAY = ['月','火','水','木','金','土','日'];
let editing = null;

function initDayOptions() {
  const monthday = document.getElementById('f-monthday');
  monthday.innerHTML = '';
  for (let i = 1; i <= 31; i++) {
    monthday.innerHTML += `<option value="${i}">${i}日</option>`;
  }
  const ym = document.getElementById('f-year-month');
  ym.innerHTML = '';
  for (let i = 1; i <= 12; i++) {
    ym.innerHTML += `<option value="${i}">${i}月</option>`;
  }
  const yd = document.getElementById('f-year-day');
  yd.innerHTML = '';
  for (let i = 1; i <= 31; i++) {
    yd.innerHTML += `<option value="${i}">${i}日</option>`;
  }
}
initDayOptions();

function updateFields() {
  const type = document.getElementById('f-type').value;
  document.getElementById('field-weekly').style.display = type === 'weekly' ? 'block' : 'none';
  document.getElementById('field-monthly').style.display = type === 'monthly' ? 'block' : 'none';
  document.getElementById('field-yearly').style.display = type === 'yearly' ? 'block' : 'none';
}

function describe(t) {
  if (t.recur_type === 'weekly') return `毎週${WEEKDAY[t.recur_day]}曜`;
  if (t.recur_type === 'monthly') return `毎月${t.recur_day}日`;
  if (t.recur_type === 'yearly') return `毎年${t.recur_month}月${t.recur_day}日`;
  return '';
}

async function load() {
  const res = await fetch('/api/templates');
  const list = await res.json();
  const el = document.getElementById('list');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">テンプレートはありません</div>';
    return;
  }
  el.innerHTML = list.map(t => {
    const cls = t.active ? '' : 'inactive';
    const nxt = t.next_date ? `次回: ${t.next_date}` : '';
    return `<div class="tpl ${cls}" data-id="${t.id}">
      <div class="info">
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="meta">${describe(t)} ${nxt ? '・ ' + nxt : ''}${t.active ? '' : ' ・ 無効'}</div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.tpl').forEach(node => {
    node.addEventListener('click', () => {
      const id = parseInt(node.dataset.id);
      openEdit(list.find(t => t.id === id));
    });
  });
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openForm() {
  editing = null;
  document.getElementById('form-title').textContent = '新規テンプレート';
  document.getElementById('f-title').value = '';
  document.getElementById('f-type').value = 'monthly';
  document.getElementById('f-weekday').value = '0';
  document.getElementById('f-monthday').value = '1';
  document.getElementById('f-year-month').value = '1';
  document.getElementById('f-year-day').value = '1';
  document.getElementById('f-active').checked = true;
  document.getElementById('f-delete').style.display = 'none';
  updateFields();
  document.getElementById('form-modal').classList.add('show');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function openEdit(t) {
  editing = t;
  document.getElementById('form-title').textContent = 'テンプレートを編集';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-type').value = t.recur_type;
  if (t.recur_type === 'weekly') document.getElementById('f-weekday').value = t.recur_day;
  if (t.recur_type === 'monthly') document.getElementById('f-monthday').value = t.recur_day;
  if (t.recur_type === 'yearly') {
    document.getElementById('f-year-month').value = t.recur_month;
    document.getElementById('f-year-day').value = t.recur_day;
  }
  document.getElementById('f-active').checked = !!t.active;
  document.getElementById('f-delete').style.display = 'block';
  updateFields();
  document.getElementById('form-modal').classList.add('show');
}

function closeForm(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('form-modal').classList.remove('show');
}

async function saveTemplate() {
  const title = document.getElementById('f-title').value.trim();
  const recur_type = document.getElementById('f-type').value;
  const active = document.getElementById('f-active').checked ? 1 : 0;
  if (!title) { alert('タイトルを入力してください'); return; }

  let recur_day = null, recur_month = null;
  if (recur_type === 'weekly') {
    recur_day = parseInt(document.getElementById('f-weekday').value);
  } else if (recur_type === 'monthly') {
    recur_day = parseInt(document.getElementById('f-monthday').value);
  } else if (recur_type === 'yearly') {
    recur_month = parseInt(document.getElementById('f-year-month').value);
    recur_day = parseInt(document.getElementById('f-year-day').value);
  }

  const body = { title, recur_type, recur_day, recur_month, active };
  if (editing) {
    await fetch(`/api/templates/${editing.id}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
  } else {
    await fetch('/api/templates', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
  }
  closeForm();
  load();
}

async function deleteTemplate() {
  if (!editing) return;
  if (!confirm('削除しますか？（生成済みのToDoは残ります）')) return;
  await fetch(`/api/templates/${editing.id}`, { method: 'DELETE' });
  closeForm();
  load();
}

load();
</script>
</body>
</html>
